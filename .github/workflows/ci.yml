name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Check default build
        run: cargo check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

      - name: Test default build
        run: cargo test

      - name: Check Feishu build
        run: cargo check --features feishu --bin tiny-claw-feishu

      - name: Test Feishu feature
        run: cargo test --features feishu

  release-build:
    name: Build Feishu release artifact
    runs-on: ubuntu-latest
    needs: rust
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build Feishu release binary
        run: cargo build --release --features feishu --bin tiny-claw-feishu

      - name: Upload Feishu release binary
        uses: actions/upload-artifact@v7
        with:
          name: tiny-claw-feishu-linux-x86_64
          path: target/release/tiny-claw-feishu
          if-no-files-found: error
